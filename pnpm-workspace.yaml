injectWorkspacePackages: true

packages:
  - packages/*

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - "@vitrify/*"
  - vitrify
  - "@simsustech/quasar-components"
  - "@modular-api/*"
  - "@quasar/*"
  - vue-router
  - unocss-preset-quasar
  - oxfmt
  - "@oxfmt/*"
  - "@myriaddreamin/*"
  - "@oxlint/*"
  - oxlint
  - vite
  - axios@1.18.1
  - cronstrue@3.21.0
  - '@types/node@26.0.1'
  - cron-parser@5.6.1
  - pg-boss@12.22.0
  - stripe@22.3.0

allowBuilds:
  "@parcel/watcher": true
  ejs: true
  esbuild: true
  sharp: true
  simple-git-hooks: true

minimumReleaseAgeIgnoreMissingTime: true

overrides: {}
